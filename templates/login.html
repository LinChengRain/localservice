{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <h1 class="login-title">管理后台</h1>
        <p class="login-subtitle">请使用管理员账户登录</p>

        <form action="{{ url_for('auth.login') }}" method="POST" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="login-field">
                <div class="login-input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <input type="text" id="username" name="username" required placeholder="用户名" autocomplete="username">
            </div>

            <div class="login-field">
                <div class="login-input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <input type="password" id="password" name="password" required placeholder="密码" autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">登录</button>
        </form>
    </div>
</div>

<style>
.login-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 140px);
}

.login-card {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow);
    border: 0.5px solid var(--border);
    text-align: center;
}

.login-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 1.25rem;
    background: linear-gradient(145deg, #5ac8fa, #007aff);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,122,255,0.25);
}

.login-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 0.375rem;
    letter-spacing: -0.02em;
}

.login-subtitle {
    font-size: 0.9375rem;
    color: var(--text-secondary);
    margin: 0 0 2rem;
}

.login-form {
    text-align: left;
}

.login-field {
    position: relative;
    margin-bottom: 1rem;
}

.login-input-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
    display: flex;
    align-items: center;
}

.login-field input {
    width: 100%;
    padding: 0.875rem 1rem 0.875rem 3rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    transition: var(--transition);
    box-sizing: border-box;
}

.login-field input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-bg);
    background: var(--card);
}

.login-field input::placeholder {
    color: var(--text-tertiary);
}

.login-btn {
    width: 100%;
    padding: 0.875rem;
    margin-top: 0.5rem;
    background: var(--primary);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
}

.login-btn:hover {
    background: var(--primary-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,122,255,0.25);
}

.login-btn:active {
    transform: translateY(0);
}
</style>
{% endblock %}
