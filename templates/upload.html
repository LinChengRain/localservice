{% extends "base.html" %}

{% block title %}上传应用{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left">
        <h1>上传应用</h1>
        <p class="subtitle">上传企业签名的 IPA、HAP 或 APK 文件</p>
    </div>
    <a href="{{ url_for('main.index') }}" class="btn btn-ghost">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回
    </a>
</div>

<div class="upload-form">
    <form action="{{ url_for('upload.upload') }}" method="POST" enctype="multipart/form-data" id="uploadForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="ipa_file">安装包文件 *</label>
            <div class="file-input-wrapper" id="dropZone">
                <input type="file" id="ipa_file" name="ipa_file" accept=".ipa,.hap,.apk" required>
                <div class="file-input-hint" id="fileHint">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>点击选择或拖拽 IPA / HAP / APK 文件</span>
                </div>
            </div>
        </div>

        <div class="upload-progress" id="uploadProgress" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">0%</span>
        </div>

        <div class="form-loading" id="loadingIndicator" style="display: none;">
            <div class="spinner"></div>
            <span id="loadingText">正在解析...</span>
        </div>

        <div class="icon-preview" id="iconPreview" style="display: none;">
            <img id="iconImg" src="" alt="应用图标">
            <span class="icon-label">已提取图标</span>
        </div>

        <div class="form-group">
            <label for="name">应用名称 *</label>
            <input type="text" id="name" name="name" required placeholder="将自动填充">
        </div>

        <div class="form-group">
            <label for="bundle_id">Bundle ID *</label>
            <input type="text" id="bundle_id" name="bundle_id" required placeholder="将自动填充">
        </div>

        <div class="form-group">
            <label for="version">版本号</label>
            <input type="text" id="version" name="version" placeholder="将自动填充">
        </div>

        <div class="form-group">
            <label for="build_type">包类型</label>
            <select id="build_type" name="build_type">
                <option value="testing" selected>测试版</option>
                <option value="staging">准生产</option>
                <option value="release">正式版</option>
                <option value="debug">调试版</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">描述</label>
            <textarea id="description" name="description" rows="2" placeholder="可选：应用简介"></textarea>
        </div>

        <div class="form-group">
            <label for="changelog">更新日志</label>
            <textarea id="changelog" name="changelog" rows="3" placeholder="可选：本次更新内容"></textarea>
        </div>

        <input type="hidden" id="extracted_icon" name="extracted_icon" value="">

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn" disabled>上传</button>
        </div>
    </form>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', function() {
    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '上传中...';
});
</script>

<div class="info-box">
    <h3>注意事项</h3>
    <ul>
        <li>IPA 必须使用企业证书签名</li>
        <li>HAP 文件需确保已签名（企业分发证书）</li>
        <li>APK 文件需确保已签名（支持直接下载安装）</li>
        <li>Bundle ID 需与包内一致</li>
        <li>上传后自动生成安装链接</li>
    </ul>
</div>

<script src="/static/vendor/jszip.min.js"></script>
<script>
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('ipa_file');

['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(eventName) {
    dropZone.addEventListener(eventName, function(e) {
        e.preventDefault();
        e.stopPropagation();
    }, false);
});

['dragenter', 'dragover'].forEach(function(eventName) {
    dropZone.addEventListener(eventName, function() {
        dropZone.classList.add('drag-over');
    }, false);
});

['dragleave', 'drop'].forEach(function(eventName) {
    dropZone.addEventListener(eventName, function() {
        dropZone.classList.remove('drag-over');
    }, false);
});

dropZone.addEventListener('drop', function(e) {
    var files = e.dataTransfer.files;
    if (files.length > 0) {
        fileInput.files = files;
        fileInput.dispatchEvent(new Event('change'));
    }
}, false);

function handleFile(file) {
    if (!file) return;

    document.getElementById('fileHint').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>' + file.name + '</span>';
    document.getElementById('loadingIndicator').style.display = 'flex';
    document.getElementById('loadingText').textContent = '正在上传文件...';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('iconPreview').style.display = 'none';

    var formData = new FormData();
    formData.append('ipa_file', file);

    var isHap = file.name.toLowerCase().endsWith('.hap');
    var isApk = file.name.toLowerCase().endsWith('.apk');
    var parseUrl = isApk ? '/api/parse-apk' : (isHap ? '/api/parse-hap' : '/api/parse-ipa');

    var xhr = new XMLHttpRequest();
    xhr.open('POST', parseUrl, true);

    var progressEl = document.getElementById('uploadProgress');
    var progressFill = document.getElementById('progressFill');
    var progressText = document.getElementById('progressText');

    xhr.upload.addEventListener('progress', function(e) {
        if (e.lengthComputable) {
            var percent = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
            if (percent < 100) {
                progressEl.style.display = 'flex';
            }
        }
    });

    xhr.addEventListener('load', function() {
        progressEl.style.display = 'none';
        progressFill.style.width = '0%';
        progressText.textContent = '0%';

        if (xhr.status === 200) {
            var result = JSON.parse(xhr.responseText);
            if (result.error) { alert('解析失败: ' + result.error); return; }
            document.getElementById('loadingText').textContent = '解析完成';
            document.getElementById('name').value = result.name || '';
            document.getElementById('bundle_id').value = result.bundle_id || '';
            document.getElementById('version').value = result.version || '';

            if (result.icon) {
                document.getElementById('iconImg').src = result.icon;
                document.getElementById('iconPreview').style.display = 'flex';
                document.getElementById('extracted_icon').value = result.icon;
            }
            setTimeout(function() {
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }, 300);
        } else {
            alert('解析失败');
            document.getElementById('loadingIndicator').style.display = 'none';
        }
    });

    xhr.addEventListener('error', function() {
        progressEl.style.display = 'none';
        alert('上传失败');
        document.getElementById('loadingIndicator').style.display = 'none';
    });

    xhr.send(formData);

    if (isApk) {
        return;
    }

    if (typeof JSZip !== 'undefined') {
        document.getElementById('loadingText').textContent = '正在提取图标...';
        var reader = new FileReader();
        reader.onload = function(e) {
            JSZip.loadAsync(e.target.result).then(function(zip) {
                var paths = Object.keys(zip.files);
                var iconPath = null;

                if (isHap) {
                    for (var i = 0; i < paths.length; i++) {
                        if ((paths[i].endsWith('module.json') || paths[i].endsWith('module.json5')) && !paths[i].includes('resources')) {
                            return zip.file(paths[i]).async('string').then(function(jsonStr) {
                                var moduleData;
                                try {
                                    moduleData = JSON.parse(jsonStr);
                                } catch(e) {
                                    var cleaned = jsonStr.replace(/\/\/.*?$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '').replace(/,(\s*[}\]])/g, '$1');
                                    moduleData = JSON.parse(cleaned);
                                }
                                var iconRef = (moduleData.app && moduleData.app.icon) || (moduleData.module && moduleData.module.icon) || '';
                                
                                if (iconRef.startsWith('$media:')) {
                                    var mediaName = iconRef.replace('$media:', '');
                                    for (var j = 0; j < paths.length; j++) {
                                        if (paths[j].endsWith(mediaName + '.png') || paths[j].endsWith(mediaName + '.jpg')) {
                                            iconPath = paths[j];
                                            break;
                                        }
                                    }
                                }
                                
                                if (!iconPath) {
                                    for (var j = 0; j < paths.length; j++) {
                                        if (paths[j].includes('media') && (paths[j].endsWith('.png') || paths[j].endsWith('.jpg'))) {
                                            iconPath = paths[j];
                                            break;
                                        }
                                    }
                                }
                                
                                if (iconPath) {
                                    return zip.file(iconPath).async('base64').then(function(data) {
                                        var dataUrl = 'data:image/png;base64,' + data;
                                        document.getElementById('iconImg').src = dataUrl;
                                        document.getElementById('iconPreview').style.display = 'flex';
                                        document.getElementById('extracted_icon').value = dataUrl;
                                    });
                                }
                            });
                        }
                    }
                } else {
                    var iconPatterns = ['AppIcon60x60@2x.png', 'AppIcon60x60@3x.png', 'AppIcon-60@2x.png', 'AppIcon.png'];
                    for (var i = 0; i < iconPatterns.length; i++) {
                        for (var j = 0; j < paths.length; j++) {
                            if (paths[j].endsWith(iconPatterns[i])) { iconPath = paths[j]; break; }
                        }
                        if (iconPath) break;
                    }
                    if (!iconPath) {
                        for (var i = 0; i < paths.length; i++) {
                            if (paths[i].includes('AppIcon') && paths[i].endsWith('.png') && !paths[i].includes('@')) { iconPath = paths[i]; break; }
                        }
                    }
                    if (iconPath) {
                        return zip.file(iconPath).async('base64').then(function(data) {
                            var dataUrl = 'data:image/png;base64,' + data;
                            document.getElementById('iconImg').src = dataUrl;
                            document.getElementById('iconPreview').style.display = 'flex';
                            document.getElementById('extracted_icon').value = dataUrl;
                        });
                    }
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }
}

fileInput.addEventListener('change', function(e) {
    handleFile(e.target.files[0]);
});
</script>

<style>
.icon-preview {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem;
    margin-bottom: 1.25rem;
    background: var(--success-bg);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(52,199,89,0.2);
}

.icon-preview img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.icon-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--success);
}
</style>
{% endblock %}
