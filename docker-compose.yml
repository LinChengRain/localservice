version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs
      - ./apps.db:/app/apps.db
    environment:
      - LAN_REQUIRE_LOGIN=false
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
