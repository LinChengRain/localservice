services:
  web:
    build: .
    ports:
      - "8808:8808"
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs
    env_file:
      - .env
    environment:
      - LAN_REQUIRE_LOGIN=${LAN_REQUIRE_LOGIN:-false}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?请设置管理员密码}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8808/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://web:8808
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
